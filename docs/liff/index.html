<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>イベント参加登録</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:15px;background:#f2f2f7;color:#222;-webkit-tap-highlight-color:transparent}
.wrap{max-width:520px;margin:0 auto;padding:12px 12px 56px}
h1{font-size:17px;text-align:center;padding:14px 0 10px;color:#06c755;font-weight:bold}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px}
.card-sub{background:#f8f8f8;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #e8e8e8}
.sec-label{font-size:13px;font-weight:bold;color:#555;border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:14px;letter-spacing:.3px}
.sec-note{font-size:12px;color:#888;font-weight:normal;margin-left:6px}
.fg{margin-bottom:14px}
.fg:last-child{margin-bottom:0}
.frow{display:flex;gap:8px}
.frow .fg{flex:1;min-width:0}
.fl{display:block;font-size:13px;color:#666;margin-bottom:4px}
.req{color:#e00;font-size:11px;margin-left:2px}
.sub-note{font-size:11px;color:#999;margin-top:3px}
input[type=text],input[type=email],input[type=tel],input[type=number]{width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:7px;font-size:15px;background:#fff;-webkit-appearance:none;appearance:none}
input[type=number]{max-width:120px}
input:focus{border-color:#06c755;outline:none}
.rlist,.clist{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid #eee;border-radius:7px;cursor:pointer}
.opt input{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:#06c755}
.opt span{line-height:1.4;font-size:14px}
.ev-opt{display:flex;align-items:flex-start;gap:9px;padding:12px;border:1px solid #eee;border-radius:8px;cursor:pointer;margin-bottom:0;background:#fafafa}
.ev-wrap{margin-bottom:8px}
.ev-detail{padding:12px 14px;background:#f4fff8;border:1px solid #9de0b4;border-top:none;border-radius:0 0 8px 8px}
.ev-opt input{width:18px;height:18px;flex-shrink:0;margin-top:3px;cursor:pointer;accent-color:#06c755}
.ev-name{font-weight:bold;font-size:14px;margin-bottom:4px}
.ev-meta{font-size:12px;color:#555;margin-bottom:3px;line-height:1.6}
.ev-meta span{display:block}
.ev-desc{font-size:12px;color:#777;margin-top:4px;line-height:1.6;white-space:pre-wrap}
.ev-deadline{font-size:11px;color:#aaa;margin-top:4px}
.add-btn{width:100%;padding:12px;background:#fff;color:#06c755;border:2px dashed #06c755;border-radius:9px;font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:10px;letter-spacing:.3px}
.add-modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:1000;align-items:center;justify-content:center;padding:16px}
.remove-btn{float:right;padding:4px 10px;background:#fff;color:#e00;border:1px solid #e00;border-radius:5px;font-size:12px;cursor:pointer;margin-bottom:8px}
.btn{width:100%;padding:14px;background:#06c755;color:#fff;border:none;border-radius:9px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:4px;letter-spacing:.5px}
.btn:disabled{background:#bbb;cursor:default}
.gerr{color:#e00;font-size:13px;text-align:center;padding:8px 10px;background:#fff0f0;border-radius:6px;margin-bottom:8px;display:none;line-height:1.6}
.ret-note{font-size:12px;color:#059a48;background:#f0fff6;border:1px solid #b8f0cc;border-radius:7px;padding:9px 11px;margin-bottom:10px}
.intro-note{font-size:14px;color:#444;background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;line-height:1.8;border-left:4px solid #06c755}
.tos-box{font-size:12px;color:#555;background:#f9f9f9;border:1px solid #eee;border-radius:7px;padding:10px;height:180px;overflow-y:scroll;margin-bottom:10px;line-height:1.8}
.tos-scroll-note{font-size:12px;color:#f07800;text-align:center;margin-bottom:8px}
.media-box{font-size:13px;color:#444;background:#fff8ee;border:1px solid #ffd580;border-radius:7px;padding:12px;margin-bottom:12px;line-height:1.8}
.other-input{margin-top:6px;padding-left:27px}
.other-input input{font-size:14px}
.loading{text-align:center;padding:70px 20px;color:#888}
.spin{width:36px;height:36px;border:3px solid #eee;border-top-color:#06c755;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.success{text-align:center;padding:40px 20px}
.si{font-size:54px;margin-bottom:14px}
.st{font-size:20px;font-weight:bold;margin-bottom:10px}
.sb{color:#555;line-height:1.7;white-space:pre-line;font-size:14px}
.errscr{text-align:center;padding:50px 20px}
.ei{font-size:48px;margin-bottom:14px}
.em{color:#555;line-height:1.6;white-space:pre-line;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎾 EPSOM&amp;CO テニスイベント参加登録</h1>
  <div id="loading" class="loading"><div class="spin"></div>読み込み中...</div>
  <div id="fw" style="display:none"></div>
  <div id="success" class="success" style="display:none">
    <div class="si">✅</div>
    <div class="st">送信完了</div>
    <div class="sb" id="sbody"></div>
  </div>
  <div id="errscr" class="errscr" style="display:none">
    <div class="ei">⚠️</div>
    <div class="em" id="emsg"></div>
  </div>
</div>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz9sfkqPCXXDQWSaHeTokthDbV_V0avhjBzfUhIatMoBTgSQs3HpE0yozoB3Wkw_WM_/exec';
var LIFF_ID = '2010231562-h4nq4P3s';

var userId = null, eventsData = [], memberData = null;
var participantCount = 1;
var pendingAddParticipantData = null;

var AREA_OPTS  = ['東京','神奈川','千葉','埼玉','その他関東圏','関東圏外'];
var ENV_OPTS   = ['スクールに通っている','会社のサークル','学校の部活・サークル','テニス仲間とコートを借りる'];
var COACH_OPTS = ['知っていて、レッスンも受けたことがある','知っているがレッスンを受けたことはない','前回のイベントで知った','今回のイベントで初めて知った','その他'];
var SRC_OPTS   = ['公式SNS','コーチSNS','LINEでのお知らせ','知人・友人の紹介','Google検索','その他'];
var RSN_OPTS   = ['コーチのレッスンを受けてみたかった','無料イベントだった','テニス仲間に誘われた','テニスイベントに興味があった','その他'];

// ========== 初期化 ==========

window.addEventListener('load', function() {
  // 15秒でタイムアウト → 再読み込みボタンを表示
  var loadTimer = setTimeout(function() {
    var ld = document.getElementById('loading');
    if (ld && ld.style.display !== 'none') {
      ld.innerHTML =
        '<div style="color:#c00;font-size:14px;line-height:1.8;padding:10px 0">' +
        '⚠️ 読み込みがタイムアウトしました。<br><br>' +
        'LINEアプリを完全に閉じてから<br>再度開いてください。<br><br>' +
        '<button onclick="location.reload()" style="background:#06c755;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;font-weight:bold">再読み込み</button>' +
        '</div>';
    }
  }, 15000);

  liff.init({ liffId: LIFF_ID })
    .then(function() {
      if (!liff.isLoggedIn()) { liff.login(); return; }
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return;
      userId = profile.userId;
      // GAS への fetch が詰まった場合も 10 秒でタイムアウト
      var fetchTimeout = new Promise(function(_, reject) {
        setTimeout(function() { reject(new Error('サーバーの応答がありませんでした（タイムアウト）')); }, 10000);
      });
      return Promise.race([
        Promise.all([
          fetch(GAS_URL + '?action=getEvents&userId=' + encodeURIComponent(userId)).then(function(r){ return r.json(); }),
          fetch(GAS_URL + '?action=getMember&userId=' + encodeURIComponent(userId)).then(function(r){ return r.json(); })
        ]),
        fetchTimeout
      ]);
    })
    .then(function(results) {
      clearTimeout(loadTimer);
      if (!results) return;
      eventsData = results[0] || [];
      memberData = results[1] || null;
      renderForm();
    })
    .catch(function(e) {
      clearTimeout(loadTimer);
      showErr('読み込みに失敗しました。LINEアプリを完全に閉じてから再度開いてください。\n\n(' + (e && e.message ? e.message : String(e)) + ')');
    });
});

// ========== HTML生成ユーティリティ ==========

function h(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function rv(nm) { var el = document.querySelector('input[name="' + nm + '"]:checked'); return el ? el.value : ''; }
function chk(nm) { return Array.from(document.querySelectorAll('input[name="' + nm + '"]:checked')).map(function(el){return el.value;}); }

function radioHtml(name, opts, selected) {
  return opts.map(function(o) {
    return '<label class="opt"><input type="radio" name="' + name + '" value="' + h(o) + '"' + (selected === o ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
}

function checkboxHtml(name, opts, selected) {
  return opts.map(function(o) {
    return '<label class="opt"><input type="checkbox" name="' + name + '" value="' + h(o) + '"' + (selected.indexOf(o) !== -1 ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
}

// 「その他」テキスト入力付きチェックボックスリスト
function checkboxWithOtherHtml(nameBase, opts, selected, idx) {
  var otherSelected = selected.filter(function(v){ return v.startsWith('その他'); });
  var otherText = otherSelected.length > 0 ? otherSelected[0].replace(/^その他（/, '').replace(/）$/, '') : '';
  var hasOther = otherSelected.length > 0 || selected.indexOf('その他') !== -1;
  var html = opts.map(function(o) {
    return '<label class="opt"><input type="checkbox" name="' + nameBase + '_' + idx + '" value="' + h(o) + '"' + (selected.indexOf(o) !== -1 ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
  html += '<label class="opt"><input type="checkbox" name="' + nameBase + '_' + idx + '" value="その他" onchange="toggleOtherInput(\'' + nameBase + '\',' + idx + ')"' + (hasOther ? ' checked' : '') + '><span>その他</span></label>';
  html += '<div id="' + nameBase + 'OtherWrap_' + idx + '" class="other-input"' + (hasOther ? '' : ' style="display:none"') + '>';
  html += '<input type="text" id="' + nameBase + 'OtherText_' + idx + '" placeholder="具体的に入力してください" value="' + h(otherText) + '">';
  html += '</div>';
  return html;
}

// ========== 参加者プロフィールセクション生成 ==========

function participantSectionHtml(idx, m) {
  m = m || {};
  var np = (m.name || '').split(' '), fp = (m.furigana || '').split(' ');
  var fN = h(np[0] || ''), gN = h(np.slice(1).join(' ') || '');
  var fK = h(fp[0] || ''), gK = h(fp.slice(1).join(' ') || '');
  var areas = (m.tennisArea || '').split('・').filter(Boolean);
  var envs  = (m.tennisEnv  || '').split('・').filter(Boolean);
  var age = h(m.age || '');

  // 年齢≤18の場合は緊急連絡先を必須表示
  var ageNum = parseInt(m.age || '0');
  var emergencyRequired = (!isNaN(ageNum) && ageNum > 0 && ageNum <= 18);
  var emergencyLabel = '緊急連絡先' + (emergencyRequired ? '<span class="req">*</span>' : '') ;
  var emergencyNote = emergencyRequired
    ? '18歳以下のため、保護者の緊急連絡先は必須です。'
    : '18歳以下の方は入力必須です。';

  var removeBtn = idx > 1 ? '<button class="remove-btn" onclick="removeParticipant(' + idx + ')">✕ 削除</button>' : '';

  return '<div class="card-sub" id="p_section_' + idx + '">' +
    removeBtn +
    '<div class="fg"><label class="fl">苗字<span class="req">*</span></label>' +
      '<input type="text" id="fN_' + idx + '" value="' + fN + '" placeholder="山田"></div>' +
    '<div class="fg"><label class="fl">名前<span class="req">*</span></label>' +
      '<input type="text" id="gN_' + idx + '" value="' + gN + '" placeholder="太郎"></div>' +
    '<div class="fg"><label class="fl">フリガナ（苗字）<span class="req">*</span></label>' +
      '<input type="text" id="fK_' + idx + '" value="' + fK + '" placeholder="ヤマダ"></div>' +
    '<div class="fg"><label class="fl">フリガナ（名前）<span class="req">*</span></label>' +
      '<input type="text" id="gK_' + idx + '" value="' + gK + '" placeholder="タロウ"></div>' +
    '<div class="fg"><label class="fl">年齢<span class="req">*</span></label>' +
      '<input type="number" id="age_' + idx + '" value="' + age + '" placeholder="30" min="1" max="99" onchange="onAgeChange(' + idx + ')"></div>' +
    '<div class="fg"><label class="fl">性別<span class="req">*</span></label>' +
      '<div class="rlist">' + radioHtml('gnd_' + idx, ['男性','女性','その他'], m.gender || '') + '</div></div>' +
    '<div class="fg"><label class="fl">メールアドレス<span class="req">*</span></label>' +
      '<input type="email" id="email_' + idx + '" value="' + h(m.email || '') + '" placeholder="example@email.com"></div>' +
    '<div class="fg"><label class="fl">電話番号<span class="req">*</span></label>' +
      '<input type="tel" id="phone_' + idx + '" value="' + h(m.phone || '') + '" placeholder="09012345678"></div>' +
    '<div class="fg" id="emergencyFg_' + idx + '"><label class="fl">' + emergencyLabel + '</label>' +
      '<input type="tel" id="emergency_' + idx + '" value="' + h(m.emergency || '') + '" placeholder="09012345678">' +
      '<div class="sub-note" id="emergencyNote_' + idx + '">' + emergencyNote + '</div></div>' +
    '<div class="fg"><label class="fl">テニスレベル<span class="req">*</span></label>' +
      '<div class="rlist">' + radioHtml('lv_' + idx, ['初心者','初級','初中級','中級','中上級','上級','超上級','プロ'], m.tennisLevel || '') + '</div></div>' +
    '<div class="fg"><label class="fl">テニスをプレイする頻度<span class="req">*</span></label>' +
      '<div class="rlist">' + radioHtml('freq_' + idx, ['ほぼ毎日','週2〜3回（平日が多い）','週2〜3回（土日祝が多い）','週1回（平日が多い）','週1回（土日祝が多い）','月2〜3回','月1回','年2〜3回','年1回','その他'], m.tennisFreq || '') + '</div></div>' +
    '<div class="fg"><label class="fl">テニス歴<span class="req">*</span></label>' +
      '<div class="rlist">' + radioHtml('hist_' + idx, ['1年未満','1〜3年','3〜5年','5年以上','その他'], m.tennisHistory || '') + '</div></div>' +
    '<div class="fg"><label class="fl">普段テニスをしている地域<span class="req">*</span><span class="sec-note">複数選択可</span></label>' +
      '<div class="clist">' + checkboxWithOtherHtml('area', AREA_OPTS, areas, idx) + '</div></div>' +
    '<div class="fg"><label class="fl">テニスをプレイしている環境<span class="req">*</span><span class="sec-note">複数選択可</span></label>' +
      '<div class="clist">' + checkboxWithOtherHtml('env', ENV_OPTS, envs, idx) + '</div></div>' +
  '</div>';
}

// ========== フォーム全体の描画 ==========

function renderForm() {
  document.getElementById('loading').style.display = 'none';
  var fw = document.getElementById('fw');

  var retNote = memberData
    ? '<div class="ret-note">以前の登録情報が入力されています。変更があれば修正してから送信してください。</div>'
    : '';

  // イベント選択カード
  var evHtml;
  if (eventsData.length === 0) {
    evHtml = '<p style="color:#888;font-size:14px;text-align:center;padding:8px 0">現在、募集中のイベントはありません。</p>';
  } else {
    evHtml = eventsData.map(function(ev, i) {
      var coachLine = ev.coachName ? '<span>👤 ' + h(ev.coachName) + '</span>' : '';
      var dateLine  = '📅 ' + ev.eventDate + (ev.eventTime ? '　🕐 ' + h(ev.eventTime) : '');
      var venueLine = ev.venue ? '<span>📍 ' + h(ev.venue) + '</span>' : '';
      var descLine  = ev.description ? '<div class="ev-desc">' + h(ev.description) + '</div>' : '';
      var perEvQ =
        '<div class="fg" style="margin-bottom:12px"><label class="fl">このイベントに応募する参加者<span class="req">*</span></label>' +
        '<div id="ev_p_list_' + i + '" class="clist"></div></div>' +
        '<div class="fg" style="margin-bottom:12px"><label class="fl">コーチのレッスンについて<span class="req">*</span></label>' +
        '<div class="rlist">' + radioHtml('coach_' + i, COACH_OPTS, '') + '</div></div>' +
        '<div class="fg" style="margin-bottom:12px"><label class="fl">このイベントを知ったきっかけ<span class="req">*</span><span class="sec-note">複数選択可</span></label>' +
        '<div class="clist">' + checkboxHtml('src_' + i, SRC_OPTS, []) + '</div></div>' +
        '<div class="fg"><label class="fl">参加応募のきっかけ<span class="req">*</span><span class="sec-note">複数選択可</span></label>' +
        '<div class="clist">' + checkboxHtml('rsn_' + i, RSN_OPTS, []) + '</div></div>';
      var appliedBadge = ev.alreadyApplied
        ? ' <span style="background:#198754;color:#fff;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:bold;vertical-align:middle">応募済み</span>'
        : '';
      var evCheckbox = ev.alreadyApplied
        ? '<input type="checkbox" name="ev" value="' + i + '" disabled>'
        : '<input type="checkbox" name="ev" value="' + i + '" onchange="onEventToggle(' + i + ')">';
      return '<div class="ev-wrap">' +
        '<label class="ev-opt">' +
        evCheckbox +
        '<div>' +
          '<div class="ev-name">' + h(ev.name) + appliedBadge + '</div>' +
          '<div class="ev-meta">' + coachLine + '<span>' + dateLine + '</span>' + venueLine + '</div>' +
          descLine +
          '<div class="ev-deadline">募集締切：' + ev.closingDate + '</div>' +
        '</div>' +
        '</label>' +
        '<div id="ev_detail_' + i + '" class="ev-detail" style="display:none">' +
        perEvQ +
        '</div>' +
      '</div>';
    }).join('');
  }

  // 参加者カード（主参加者 + 既存の追加参加者）
  var participantSections = participantSectionHtml(1, memberData);
  participantCount = 1;

  fw.innerHTML =
    retNote +

    '<div class="intro-note">' +
      'イベントに参加される方の情報をご入力ください。<br>' +
      'お子様が参加される場合は、お子様の情報をご入力ください。' +
    '</div>' +

    '<div class="card" id="participantsCard">' +
      '<div class="sec-label">👤 参加者プロフィール<span class="sec-note">初回のみ入力・以降は自動入力</span></div>' +
      '<div id="participantSections">' + participantSections + '</div>' +
    '</div>' +

    '<button class="add-btn" id="addParticipantBtn" onclick="addParticipant()">＋ もう一人追加する</button>' +

    '<div class="card">' +
      '<div class="sec-label">📅 今回の応募内容<span class="sec-note">毎回入力</span></div>' +
      '<div class="fg"><label class="fl">応募するイベント<span class="sec-note">複数選択可・任意</span></label>' + evHtml + '</div>' +
    '</div>' +

    // 利用規約
    '<div class="card">' +
      '<div class="sec-label">📋 利用規約・プライバシーポリシー<span class="sec-note">毎回確認</span></div>' +
      '<div class="tos-box" id="tosBox" onscroll="onTosScroll()">' +
        '<strong>Epsom&amp;Co. TENNIS SUPPORT イベント応募 利用規約</strong><br><br>' +
        '【利用規約】<br><br>' +
        '第1条（適用）<br>' +
        '本規約は、Epsom&amp;Co. TENNIS SUPPORT（以下「主催者」）が開催するテニスイベント（以下「本イベント」）への応募および参加に関する条件を定めるものです。応募された時点で本規約およびプライバシーポリシーに同意いただいたものとみなします。<br><br>' +
        '第2条（応募資格）<br>' +
        '本イベントへの応募は、本規約に同意された方に限ります。18歳以下の方は保護者の同意を得たうえでご応募ください。18歳以下の方は保護者の緊急連絡先のご記入が必須となります。<br><br>' +
        '第3条（当落選について）<br>' +
        '応募者多数の場合は抽選を行います。当選・落選の結果はLINEにてお知らせします。落選の場合もご連絡いたします。結果が届くまでしばらくお待ちください。<br><br>' +
        '第4条（キャンセルについて）<br>' +

        'EPSOM&amp;CO のイベントが<strong>無料で開催できているのは、参加者の皆様の撮影・インタビューへのご協力があってこそ</strong>です。<br><br>' +
        'ご応募の際は、撮影・インタビュー（<strong>顔出しあり</strong>）へのご協力に同意いただいた上でお申し込みください。' +

      '<label class="opt" style="border:none;padding:0;align-items:flex-start">' +

          '⚠️ 当落結果・集合時間などの通知は<strong>この応募いただいたLINEアカウント</strong>に届きます。<br>' +

          '<button onclick="cancelAddParticipant()" style="flex:1;padding:11px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:15px;cursor:pointer">キャンセル</button>' +
          '<button onclick="confirmAddParticipant()" style="flex:1;padding:11px;background:#06c755;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer">追加する</button>' +

// ========== 追加参加者操作 ==========

function addParticipant() {
  var modal = document.getElementById('addParticipantModal');
  var prevOpts = document.getElementById('prevParticipantOptions');
  pendingAddParticipantData = null;

  var prevParticipants = (memberData && memberData.additionalParticipants) || [];
  if (prevParticipants.length > 0) {
    var html = '<div style="font-size:13px;color:#555;margin-bottom:8px;font-weight:bold">データを選択してください</div>';
    prevParticipants.forEach(function(p, i) {
      html += '<label class="opt" style="margin-bottom:6px"><input type="radio" name="addPType" value="prev_' + i + '" onchange="onAddTypeChange(this.value)"><span>' + h(p.name || '参加者' + (i + 2)) + '（保存済み）</span></label>';
    });
    html += '<label class="opt"><input type="radio" name="addPType" value="new" checked onchange="onAddTypeChange(this.value)"><span>新しく入力する</span></label>';
    prevOpts.innerHTML = html;
  } else {
    prevOpts.innerHTML = '';
  }

  modal.style.display = 'flex';
}

function onAddTypeChange(value) {
  if (value === 'new') {
    pendingAddParticipantData = null;
  } else {
    var prevIdx = parseInt(value.replace('prev_', ''));
    pendingAddParticipantData = (memberData && memberData.additionalParticipants) ? memberData.additionalParticipants[prevIdx] : null;
  }
}

function cancelAddParticipant() {
  document.getElementById('addParticipantModal').style.display = 'none';
}

function confirmAddParticipant() {
  document.getElementById('addParticipantModal').style.display = 'none';
  participantCount++;
  var container = document.getElementById('participantSections');
  var div = document.createElement('div');
  div.innerHTML = participantSectionHtml(participantCount, pendingAddParticipantData);
  container.appendChild(div.firstChild);
  refreshEventParticipantLists();
  pendingAddParticipantData = null;
}

function removeParticipant(idx) {
  var el = document.getElementById('p_section_' + idx);
  if (el) el.remove();
  refreshEventParticipantLists();
}

// ========== 年齢変更で緊急連絡先の必須マーク切替 ==========

function onAgeChange(idx) {
  var age = parseInt(val('age_' + idx));
  var lbl = document.querySelector('#emergencyFg_' + idx + ' .fl');
  var note = document.getElementById('emergencyNote_' + idx);
  if (!isNaN(age) && age > 0 && age <= 18) {
    lbl.innerHTML = '緊急連絡先<span class="req">*</span>';
    note.textContent = '18歳以下のため、保護者の緊急連絡先は必須です。';
  } else {
    lbl.innerHTML = '緊急連絡先';
    note.textContent = '18歳以下の方は入力必須です。';
  }
}

// ========== その他テキスト入力の表示切替 ==========

function toggleOtherInput(type, idx) {
  var wrap = document.getElementById(type + 'OtherWrap_' + idx);
  var isChecked = Array.from(document.querySelectorAll('input[name="' + type + '_' + idx + '"]:checked'))
    .some(function(el){ return el.value === 'その他'; });
  wrap.style.display = isChecked ? '' : 'none';
}

// 「その他（○○）」形式の値を収集
function getCheckboxWithOther(type, idx) {
  var vals = Array.from(document.querySelectorAll('input[name="' + type + '_' + idx + '"]:checked'))
    .map(function(el){ return el.value; });
  return vals.map(function(v) {
    if (v === 'その他') {
      var text = val(type + 'OtherText_' + idx);
      return text ? 'その他（' + text + '）' : 'その他';
    }
    return v;
  });
}

// ========== 利用規約スクロール検知 ==========

function onTosScroll() {
  var box = document.getElementById('tosBox');
  if (box.scrollHeight - box.scrollTop <= box.clientHeight + 10) {
    document.getElementById('tos').disabled = false;
    document.getElementById('tosScrollNote').style.display = 'none';
  }
}

// ========== 参加者データを1オブジェクトに収集 ==========

function collectParticipant(idx) {
  return {
    familyName:    val('fN_' + idx),
    givenName:     val('gN_' + idx),
    familyNameKana:val('fK_' + idx),
    givenNameKana: val('gK_' + idx),
    age:           val('age_' + idx),
    gender:        rv('gnd_' + idx),
    tennisLevel:   rv('lv_' + idx),
    email:         val('email_' + idx),
    phone:         val('phone_' + idx),
    emergency:     val('emergency_' + idx),
    tennisFreq:    rv('freq_' + idx),
    tennisHistory: rv('hist_' + idx),
    tennisArea:    getCheckboxWithOther('area', idx),
    tennisEnv:     getCheckboxWithOther('env', idx),
  };
}

function validateParticipant(p, idx, errs) {
  var label = idx === 1 ? '' : '（参加者' + idx + '）';
  if (!p.familyName || !p.givenName) errs.push('お名前を入力してください。' + label);
  if (!p.familyNameKana || !p.givenNameKana) errs.push('フリガナを入力してください。' + label);
  if (!p.age)   errs.push('年齢を入力してください。' + label);
  if (!p.gender) errs.push('性別を選択してください。' + label);
  if (!p.email) errs.push('メールアドレスを入力してください。' + label);
  if (!p.phone) errs.push('電話番号を入力してください。' + label);
  var ageNum = parseInt(p.age);
  if (!isNaN(ageNum) && ageNum <= 18 && !p.emergency) errs.push('18歳以下の方は緊急連絡先が必須です。' + label);
  if (!p.tennisLevel) errs.push('テニスレベルを選択してください。' + label);
  if (!p.tennisFreq)  errs.push('テニスをプレイする頻度を選択してください。' + label);
  if (!p.tennisHistory) errs.push('テニス歴を選択してください。' + label);
  if (!p.tennisArea  || p.tennisArea.length  === 0) errs.push('テニスをしている地域を選択してください。' + label);
  if (!p.tennisEnv   || p.tennisEnv.length   === 0) errs.push('テニスをプレイしている環境を選択してください。' + label);
}

// ========== 送信 ==========

function getParticipantName(idx) {
  var fEl = document.getElementById('fN_' + idx);
  var gEl = document.getElementById('gN_' + idx);
  var name = ((fEl ? fEl.value.trim() : '') + ' ' + (gEl ? gEl.value.trim() : '')).trim();
  return name || (idx === 1 ? '参加者1（メイン）' : '参加者' + idx);
}

function renderEventParticipants(evIdx) {
  var container = document.getElementById('ev_p_list_' + evIdx);
  if (!container) return;
  var prevState = {}, hadPrev = false;
  container.querySelectorAll('input[type="checkbox"]').forEach(function(el) {
    prevState[el.value] = el.checked; hadPrev = true;
  });
  var html = '';
  for (var i = 1; i <= participantCount; i++) {
    if (!document.getElementById('p_section_' + i)) continue;
    var isChecked = !hadPrev || !(String(i) in prevState) || prevState[String(i)];
    html += '<label class="opt"><input type="checkbox" name="ev_p_' + evIdx + '" value="' + i + '"' + (isChecked ? ' checked' : '') + '><span>' + h(getParticipantName(i)) + '</span></label>';
  }
  container.innerHTML = html;
}

function refreshEventParticipantLists() {
  document.querySelectorAll('input[name="ev"]:checked').forEach(function(cb) {
    renderEventParticipants(parseInt(cb.value));
  });
}

function onEventToggle(idx) {
  var cb     = document.querySelector('input[name="ev"][value="' + idx + '"]');
  var detail = document.getElementById('ev_detail_' + idx);
  if (!cb || !detail) return;
  var checked = cb.checked;
  detail.style.display = checked ? '' : 'none';
  var label = cb.closest('.ev-opt');
  if (label) {
    label.style.borderRadius = checked ? '8px 8px 0 0' : '';
    label.style.borderColor  = checked ? '#9de0b4' : '';
  }
  if (checked) {
    renderEventParticipants(idx);
  } else {
    detail.querySelectorAll('input').forEach(function(el){ el.checked = false; });
  }
}

function doSubmit() {
  var btn = document.getElementById('sbtn'), gerr = document.getElementById('gerr');
  gerr.style.display = 'none';

  // 参加者データを収集
  var mainP = collectParticipant(1);
  var additionals = [];
  for (var i = 2; i <= participantCount; i++) {
    if (document.getElementById('p_section_' + i)) {
      additionals.push(collectParticipant(i));
    }
  }

  var evIdxs = chk('ev');
  var tos    = document.getElementById('tos').checked;
  var media  = document.getElementById('mediaCons').checked;

  var errs = [];
  validateParticipant(mainP, 1, errs);
  additionals.forEach(function(p, i){ validateParticipant(p, i + 2, errs); });

  evIdxs.forEach(function(i) {
    var idx    = parseInt(i);
    var evName = h(eventsData[idx] ? eventsData[idx].name : ('イベント' + (idx + 1)));
    if (chk('ev_p_' + idx).length === 0) errs.push('「' + evName + '」応募する参加者を選択してください。');
    if (!rv('coach_' + idx)) errs.push('「' + evName + '」コーチのレッスンについて回答してください。');
    if (chk('src_' + idx).length === 0) errs.push('「' + evName + '」イベントを知ったきっかけを選択してください。');
    if (chk('rsn_' + idx).length === 0) errs.push('「' + evName + '」参加応募のきっかけを選択してください。');
  });
  if (!tos)   errs.push('利用規約への同意が必要です。');
  if (!media) errs.push('撮影・インタビューへの協力同意が必要です。');

  if (errs.length) {
    gerr.innerHTML = errs.join('<br>');
    gerr.style.display = 'block';
    gerr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  btn.disabled = true; btn.textContent = '送信中...';

  var selEvs = evIdxs.map(function(i) {
    var idx = parseInt(i);
    return Object.assign({}, eventsData[idx], {
      coachKnowledge:  rv('coach_' + idx),
      eventSource:     chk('src_' + idx),
      applyReason:     chk('rsn_' + idx),
      participantNums: chk('ev_p_' + idx).map(function(v){ return parseInt(v); }),
    });
  });

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submitLiff',
      userId: userId,
      familyName:    mainP.familyName,
      givenName:     mainP.givenName,
      familyNameKana:mainP.familyNameKana,
      givenNameKana: mainP.givenNameKana,
      age:           mainP.age,
      gender:        mainP.gender,
      tennisLevel:   mainP.tennisLevel,
      email:         mainP.email,
      phone:         mainP.phone,
      emergency:     mainP.emergency,
      tennisFreq:    mainP.tennisFreq,
      tennisHistory: mainP.tennisHistory,
      tennisArea:    mainP.tennisArea,
      tennisEnv:     mainP.tennisEnv,
      additionalParticipants: additionals,
      selectedEvents:  selEvs,
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    if (res.success) {
      document.getElementById('fw').style.display = 'none';
      var applied = res.appliedEvents || [];
      document.querySelector('.st').textContent = applied.length > 0 ? '応募を受け付けました！' : 'プロフィールを更新しました！';
      document.getElementById('sbody').textContent = applied.length > 0
        ? '応募イベント:\n' + applied.map(function(n){ return '・' + n; }).join('\n') + '\n\n当落結果はLINEでお知らせします。\nしばらくお待ちください。'
        : 'プロフィール情報を更新しました。\nありがとうございます！';
      document.getElementById('success').style.display = '';
      setTimeout(function(){ try{ if(liff.isInClient()) liff.closeWindow(); }catch(e){} }, 3000);
    } else {
      btn.disabled = false; btn.textContent = '送信する';
      gerr.textContent = res.error || '送信に失敗しました。再度お試しください。';
      gerr.style.display = 'block';
    }
  })
  .catch(function() {
    btn.disabled = false; btn.textContent = '送信する';
    gerr.textContent = '通信エラーが発生しました。再度お試しください。';
    gerr.style.display = 'block';
  });
}

function showErr(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('emsg').textContent = msg;
  document.getElementById('errscr').style.display = '';
}
</script>
